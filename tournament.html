<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会詳細</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--blue:#1a3a6b;--accent:#e8a020;--red:#e05252;--white:#fff;--light:#f4f6f9;--gray:#8a96a8;--border:#dde3ed;--text:#1e2a3a}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--light);color:var(--text);min-height:100vh}
header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4)}
.header-inner{max-width:760px;margin:0 auto;padding:0 16px;height:56px;display:flex;align-items:center;gap:12px}
.header-back{display:flex;align-items:center;gap:6px;color:var(--accent);font-size:.85rem;font-weight:700;text-decoration:none;flex-shrink:0}
.header-back:hover{opacity:.8}
.header-title{font-family:'Oswald',sans-serif;font-size:1rem;color:var(--white);letter-spacing:.05em;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero{background:linear-gradient(135deg,var(--navy) 0%,#2a1a3a 100%);padding:28px 20px 36px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(60deg,transparent,transparent 28px,rgba(255,255,255,.02) 28px,rgba(255,255,255,.02) 29px)}
.hero-badge{display:inline-block;background:var(--red);color:var(--white);font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.06em;margin-bottom:12px;position:relative}
.hero-name{font-family:'Oswald',sans-serif;font-size:clamp(1.4rem,5vw,2.2rem);font-weight:700;color:var(--white);line-height:1.2;position:relative}
.hero-date{font-size:.85rem;color:rgba(255,255,255,.65);margin-top:8px;position:relative}
.main{max-width:760px;margin:0 auto;padding:20px 16px 60px}
.section{background:var(--white);border-radius:14px;box-shadow:0 2px 10px rgba(10,22,40,.07);overflow:hidden;margin-bottom:16px}
.section-header{display:flex;align-items:center;gap:10px;padding:14px 18px 10px;border-bottom:1px solid var(--border)}
.section-icon{font-size:1.1rem;flex-shrink:0}
.section-title{font-family:'Oswald',sans-serif;font-size:.95rem;letter-spacing:.06em;color:var(--navy)}
.section-body{padding:14px 18px}
.info-row{display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:.75rem;font-weight:700;color:var(--gray);min-width:80px;flex-shrink:0;padding-top:2px}
.info-value{font-size:.88rem;color:var(--text);flex:1;line-height:1.6}
.info-value.accent{color:var(--red);font-weight:700}
.info-value.notice{font-size:.8rem;color:var(--gray);font-style:italic}
.checklist{display:flex;flex-direction:column;gap:6px;padding:4px 0}
.check-item{display:flex;align-items:flex-start;gap:10px;font-size:.86rem;color:var(--text);line-height:1.5}
.check-item::before{content:'□';font-size:1rem;color:var(--accent);flex-shrink:0;margin-top:1px}
.map-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;background:var(--navy);color:var(--white);border-radius:10px;font-size:.88rem;font-weight:700;text-decoration:none;transition:opacity .15s;margin-top:4px}
.map-btn:hover{opacity:.85}
.emergency-card{background:#fff5f5;border:1.5px solid #fca5a5;border-radius:10px;padding:14px 16px}
.emergency-title{font-size:.75rem;font-weight:700;color:#b33030;margin-bottom:6px;letter-spacing:.04em}
.emergency-value{font-size:.92rem;font-weight:700;color:var(--text)}
.not-found{text-align:center;padding:60px 20px;color:var(--gray)}
.not-found-icon{font-size:2.5rem;margin-bottom:12px}
.not-found-title{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:8px}
.not-found-text{font-size:.84rem;line-height:1.7}
.status-box{background:var(--white);border-radius:12px;padding:40px 20px;text-align:center;color:var(--gray);font-size:.88rem;box-shadow:0 2px 10px rgba(10,22,40,.07)}
.spinner{display:inline-block;width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.timeline{display:flex;flex-direction:column;gap:0}
.tl-row{display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.tl-row:last-child{border-bottom:none}
.tl-time{font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:600;color:var(--accent);min-width:52px;flex-shrink:0;padding-top:1px}
.tl-label{font-size:.86rem;color:var(--text);line-height:1.5}
.pdf-btn-wrap{max-width:760px;margin:0 auto;padding:0 16px 16px;display:none}
.pdf-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--navy);color:var(--white);border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:opacity .15s}
.pdf-btn:hover{opacity:.85}
footer{text-align:center;padding:16px;font-size:.7rem;color:var(--gray);border-top:1px solid var(--border)}
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  header, .hero, .pdf-btn-wrap, footer { display: none !important; }
  body { background: #fff; font-family: 'Noto Sans JP', serif; color: #000; font-size: 9.5pt; }
  .main { max-width: 100%; padding: 0; margin: 0; }
  .section { box-shadow: none; border-radius: 0; margin-bottom: 0; border: none; page-break-inside: avoid; }
  #printDoc { display: block !important; width: 100%; padding: 10mm 15mm; font-family: 'Noto Sans JP', sans-serif; }
  .pd-title-wrap { text-align: center; border-bottom: 2.5pt solid #000; padding-bottom: 6pt; margin-bottom: 10pt; }
  .pd-title { font-size: 16pt; font-weight: 700; letter-spacing: .1em; }
  .pd-subtitle { font-size: 10pt; margin-top: 3pt; color: #333; }
  .pd-meta { display: flex; justify-content: space-between; font-size: 9pt; margin-bottom: 10pt; color: #444; }
  .pd-section { margin-bottom: 8pt; page-break-inside: avoid; }
  .pd-section-title { font-size: 10pt; font-weight: 700; background: #1e2a3a; color: #fff; padding: 3pt 8pt; margin-bottom: 0; }
  .pd-table { width: 100%; border-collapse: collapse; font-size: 9pt; }
  .pd-table td { border: 0.5pt solid #aaa; padding: 4pt 6pt; vertical-align: top; line-height: 1.5; }
  .pd-table td.label { background: #f4f4f4; font-weight: 700; width: 22%; white-space: nowrap; }
  .pd-table td.accent { color: #c00; font-weight: 700; }
  .pd-table td.notice { color: #666; font-style: italic; font-size: 8.5pt; }
  .pd-tl { width: 100%; border-collapse: collapse; font-size: 9pt; }
  .pd-tl td { border: 0.5pt solid #aaa; padding: 3pt 6pt; vertical-align: top; line-height: 1.5; }
  .pd-tl td.time { font-weight: 700; width: 14%; background: #f9f4e8; text-align: center; white-space: nowrap; }
  .pd-check { columns: 2; column-gap: 12pt; font-size: 9pt; line-height: 1.8; padding: 4pt 6pt; border: 0.5pt solid #aaa; }
  .pd-check-item::before { content: "□　"; }
  .pd-emergency { border: 1.5pt solid #c00; padding: 5pt 8pt; font-size: 9pt; }
  .pd-emergency-label { font-weight: 700; color: #c00; margin-bottom: 3pt; font-size: 8.5pt; }
  .pd-footer { text-align: center; font-size: 8pt; color: #666; border-top: 0.5pt solid #aaa; margin-top: 10pt; padding-top: 5pt; }
  @page { size: A4 portrait; margin: 0; }
  #printDoc { width: 210mm; min-height: 297mm; padding: 8mm 12mm; transform-origin: top left; }
  .section { display: none !important; }
}
</style>
</head>

<script>
// 大会詳細シートのCSV公開URL
const DETAIL_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHN9gczb9ynaiPe_yfZXXumYbHj_5jZQMQ0sAIXq_O_jPlTcuxUE1xHC6jLbkYuBX1sZk34y-8ots4/pub?gid=2871714&single=true&output=csv";

// ヘッダー行の名前から自動で列を探す仕組みです
let DCOL = {};
function mapColumns(headerRow) {
  const mapping = {

    "PDF": "pdfUrl",
    "大会名": "name",
    "会場名": "venue",

<script>
const DOW_JP = ["日","月","火","水","木","金","土"];

function parseDate(str) {
  if (!str) return null;
  const m = str.match(/(\d{4}).(\d{1,2}).(\d{1,2})/);
  if (!m) return null;
  const d = new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  return isNaN(d.getTime()) ? null : d;
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function parseCSV(text) {
  const rows = [];
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols=[]; let cur="", inQ=false;
    for (let i=0; i<line.length; i++) {
      const c=line[i];
      if(c==='"'&&!inQ){inQ=true;}
      else if(c==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur="";}
      else{cur+=c;}
    }
    cols.push(cur.trim()); rows.push(cols);
  }
  return rows;
}

async function fetchWithTimeout(url, ms) {
  const ctrl=new AbortController();
  const tid=setTimeout(function(){ctrl.abort();},ms);
  try{const r=await fetch(url,{signal:ctrl.signal});clearTimeout(tid);return r;}
  catch(e){clearTimeout(tid);throw e;}
}

async function getCSV(url) {
  try{const r=await fetchWithTimeout(url,8000);if(r.ok){const t=await r.text();if(t&&t.includes(","))return t;}}catch(e){console.warn("direct:",e.message);}
  const proxies=["https://corsproxy.io/?"+encodeURIComponent(url),"https://api.allorigins.win/get?url="+encodeURIComponent(url)];
  for(const pu of proxies){
    try{const r=await fetchWithTimeout(pu,8000);if(!r.ok)continue;const t=await r.text();
    try{const j=JSON.parse(t);if(j.contents&&j.contents.includes(","))return j.contents;}catch(e){}
    if(t&&t.includes(","))return t;}catch(e){console.warn("proxy:",e.message);}
  }
  throw new Error("データを取得できませんでした");
}

function buildChecklist(text) {
  if(!text) return "";
  const items=text.split(/[、,，\n]/).map(function(s){return s.trim();}).filter(Boolean);
  return '<div class="checklist">'+items.map(function(item){return '<div class="check-item">'+esc(item)+'</div>';}).join("")+'</div>';
}

function buildTlParts(schedule) {
  var parts=schedule.split(/(\d{1,2}[：:]\d{2})/);
  var result=[];
  if(parts.length<=1){result.push({time:"",label:schedule});}
  else{
    for(var ti=0;ti<parts.length;ti++){
      var tp=parts[ti].trim();
      if(!tp) continue;
      if(/^\d{1,2}[：:]\d{2}$/.test(tp)){
        var lbl=(parts[ti+1]||'').replace(/^[、,，\s]+/,'').replace(/[、,，\s]+$/,'').trim();
        result.push({time:tp,label:lbl});
        ti++;
      }
    }
  }
  return result;
}

function renderDetail(row) {
  var date     =parseDate(row[DCOL.date]);
  var dateStr  =date?date.getFullYear()+"年"+(date.getMonth()+1)+"月"+date.getDate()+"日（"+DOW_JP[date.getDay()]+"）":row[DCOL.date];
  var name     =row[DCOL.name]||"大会詳細";
  var venue    =row[DCOL.venue]||"";
  var meetPlace=row[DCOL.meetPlace]||"";
  var meetTime =row[DCOL.meetTime]||"";
  var itemsP   =row[DCOL.itemsPersonal]||"";
  var itemsT   =row[DCOL.itemsTeam]||"";
  var escort   =row[DCOL.escort]||"";
  var car      =row[DCOL.car]||"";
  var fee      =row[DCOL.fee]||"";
  var emergency=row[DCOL.emergency]||"";
  var mapUrl   =row[DCOL.mapUrl]||"";
  var schedule =row[DCOL.schedule]||"";
  var members3 =row[DCOL.members3]||"";
  var members2 =row[DCOL.members2]||"";
  var members1 =row[DCOL.members1]||"";
  var pdfUrl   =row[DCOL.pdfUrl]||"";
  
  if(pdfUrl) pdfUrl=pdfUrl.replace(/\/view(\?.*)?$/, "/preview");
  var tlItems  =schedule?buildTlParts(schedule):[];

  document.getElementById("heroArea").innerHTML=
    '<div class="hero"><div class="hero-badge">🏆 大会</div>'
    +'<div class="hero-name">'+esc(name)+'</div>'
    +'<div class="hero-date">📅 '+esc(dateStr)+'</div></div>';

  if(pdfUrl) {
    document.getElementById("mainArea").innerHTML=
      '<div style="width:100%;height:calc(100vh - 120px);">'
      +'<iframe src="'+pdfUrl+'" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>'
      +'<div style="text-align:center;padding:12px;">'
      +'<a href="'+pdfUrl+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--navy);color:#fff;border-radius:8px;font-size:.85rem;font-weight:700;text-decoration:none;">📄 PDFを別タブで開く</a>'
      +'</div></div>';
    document.getElementById("pdfBtnWrap").style.display="none";
    return;
  }

  var html="";

  html+='<div class="section"><div class="section-header"><span class="section-icon">🕗</span><span class="section-title">日程</span></div><div class="section-body">';
  if(meetPlace) html+='<div class="info-row"><div class="info-label">集合場所</div><div class="info-value">'+esc(meetPlace)+'</div></div>';
  if(meetTime)  html+='<div class="info-row"><div class="info-label">集合時間</div><div class="info-value accent">'+esc(meetTime)+'</div></div>';
  html+='<div class="info-row"><div class="info-label">解散時間</div><div class="info-value notice">終了次第、保護者LINEにてご連絡します</div></div>';
  if(tlItems.length){
    html+='<div style="padding:12px 0 4px;font-size:.75rem;font-weight:700;color:var(--gray);border-top:1px solid var(--border);margin-top:4px">日程</div><div class="timeline">';
    tlItems.forEach(function(it){html+='<div class="tl-row"><div class="tl-time">'+esc(it.time)+'</div><div class="tl-label">'+esc(it.label)+'</div></div>';});
    html+='</div>';
  }
  html+='</div></div>';

  if(members3||members2||members1){
    html+='<div class="section"><div class="section-header"><span class="section-icon">👥</span><span class="section-title">参加生徒</span></div><div class="section-body">';
    if(members3) html+='<div class="info-row"><div class="info-label">3年</div><div class="info-value">'+esc(members3)+'</div></div>';
    if(members2) html+='<div class="info-row"><div class="info-label">2年</div><div class="info-value">'+esc(members2)+'</div></div>';
    if(members1) html+='<div class="info-row"><div class="info-label">1年</div><div class="info-value">'+esc(members1)+'</div></div>';
    html+='</div></div>';
  }
  if(itemsP||itemsT){
    html+='<div class="section"><div class="section-header"><span class="section-icon">🎒</span><span class="section-title">持ち物</span></div><div class="section-body">';
    if(itemsP) html+='<div class="info-row"><div class="info-label">個人</div><div class="info-value">'+buildChecklist(itemsP)+'</div></div>';
    if(itemsT) html+='<div class="info-row"><div class="info-label">チーム</div><div class="info-value">'+buildChecklist(itemsT)+'</div></div>';
    html+='</div></div>';
  }
  if(escort){
    html+='<div class="section"><div class="section-header"><span class="section-icon">👨‍🏫</span><span class="section-title">引率</span></div><div class="section-body">';
    html+='<div class="info-row"><div class="info-label">引率者</div><div class="info-value">'+esc(escort).replace(/\n/g,"<br>")+'</div></div>';
    html+='</div></div>';
  }
  if(car||fee){
    html+='<div class="section"><div class="section-header"><span class="section-icon">🚗</span><span class="section-title">配車・費用</span></div><div class="section-body">';
    if(car) html+='<div class="info-row"><div class="info-label">配車当番</div><div class="info-value">'+esc(car).replace(/\n/g,"<br>")+'</div></div>';
    if(fee) html+='<div class="info-row"><div class="info-label">集金額</div><div class="info-value accent">'+esc(fee)+'</div></div>';
    html+='</div></div>';
  }
  if(venue||mapUrl){
    html+='<div class="section"><div class="section-header"><span class="section-icon">📍</span><span class="section-title">会場</span></div><div class="section-body">';
    if(venue) html+='<div class="info-row"><div class="info-label">会場名</div><div class="info-value">'+esc(venue)+'</div></div>';
    if(mapUrl) html+='<a class="map-btn" href="'+esc(mapUrl)+'" target="_blank">🗺️ Googleマップで開く</a>';
    html+='</div></div>';
  }
  if(emergency){
    html+='<div class="section"><div class="section-header"><span class="section-icon">📞</span><span class="section-title">緊急連絡先</span></div><div class="section-body"><div class="emergency-card"><div class="emergency-title">⚠️ 緊急時のみ</div><div class="emergency-value">'+esc(emergency).replace(/\n/g,"<br>")+'</div></div></div></div>';
  }
  document.getElementById("mainArea").innerHTML=html;

  var pd="";
  pd+='<div style="font-size:9pt;margin-bottom:1pt;">保護者各位</div>';
  pd+='<div style="font-size:9pt;text-align:right;margin-bottom:6pt;">土淵中学校ソフトテニス部</div>';
  pd+='<div class="pd-title-wrap">';
  pd+='<div class="pd-title">大会参加計画</div>';
  pd+='<div class="pd-subtitle">'+esc(name)+'　'+esc(dateStr)+'</div>';
  pd+='</div>';

  pd+='<div class="pd-section"><div class="pd-section-title">■ 日程・集合</div>';
  pd+='<table class="pd-table">';
  if(meetPlace) pd+='<tr><td class="label">集合場所</td><td>'+esc(meetPlace)+'</td></tr>';
  if(meetTime)  pd+='<tr><td class="label">集合時間</td><td class="accent">'+esc(meetTime)+'</td></tr>';
  pd+='<tr><td class="label">解散時間</td><td class="notice">終了次第、保護者LINEにてご連絡します</td></tr>';
  if(venue)     pd+='<tr><td class="label">会場</td><td>'+esc(venue)+'</td></tr>';

  if(tlItems.length){

    pd+='<table class="pd-tl">';

  if(members3||members2||members1){
    pd+='<div class="pd-section"><div class="pd-section-title">■ 参加生徒</div>';
    pd+='<table class="pd-table">';
    if(members3) pd+='<tr><td class="label">3年</td><td>'+esc(members3)+'</td></tr>';
    if(members2) pd+='<tr><td class="label">2年</td><td>'+esc(members2)+'</td></tr>';
    if(members1) pd+='<tr><td class="label">1年</td><td>'+esc(members1)+'</td></tr>';
    pd+='</table></div>';
  }

  if(itemsP||itemsT){
    pd+='<div class="pd-section"><div class="pd-section-title">■ 持ち物</div>';
    if(itemsP){
      var pItems=itemsP.split(/[、,，\n]/).map(function(s){return s.trim();}).filter(Boolean);
      pd+='<div style="font-size:8.5pt;font-weight:700;padding:3pt 0 2pt;color:#444">【個人】</div>';
      pd+='<div class="pd-check">';
      pItems.forEach(function(it){pd+='<div class="pd-check-item">'+esc(it)+'</div>';});
      pd+='</div>';
    }
    if(itemsT){
      var tItems=itemsT.split(/[、,，\n]/).map(function(s){return s.trim();}).filter(Boolean);
      pd+='<div style="font-size:8.5pt;font-weight:700;padding:4pt 0 2pt;color:#444">【チーム】</div>';
      pd+='<div class="pd-check">';
      tItems.forEach(function(it){pd+='<div class="pd-check-item">'+esc(it)+'</div>';});
      pd+='</div>';
    }
    pd+='</div>';
  }

  if(escort){
    pd+='<div class="pd-section"><div class="pd-section-title">■ 引率</div>';
    pd+='<table class="pd-table"><tr><td class="label">引率者</td><td>'+esc(escort).replace(/\n/g,"<br>")+'</td></tr></table></div>';
  }

  if(car||fee){
    pd+='<div class="pd-section"><div class="pd-section-title">■ 配車・費用</div>';
    pd+='<table class="pd-table">';
    if(car) pd+='<tr><td class="label">配車当番</td><td>'+esc(car).replace(/\n/g,"<br>")+'</td></tr>';
    if(fee) pd+='<tr><td class="label">集金額</td><td class="accent">'+esc(fee)+'</td></tr>';
    pd+='</table></div>';
  }

  if(emergency){
    pd+='<div class="pd-section"><div class="pd-section-title">■ 緊急連絡先</div>';
    pd+='<div class="pd-emergency"><div class="pd-emergency-label">⚠️ 緊急時のみご使用ください</div>'+esc(emergency).replace(/\n/g,"<br>")+'</div></div>';
  }

  pd+='<div class="pd-footer">土淵中学校ソフトテニス部　保護者配布資料　印刷日：'+new Date().toLocaleDateString("ja-JP")+'</div>';

  document.getElementById("printDoc").innerHTML=pd;
  document.getElementById("pdfBtnWrap").style.display="block";
}

function printPDF() {
  var doc = document.getElementById("printDoc");
  if (doc) {
    doc.style.transform = "";
    doc.style.fontSize  = "";
    var contentH = doc.scrollHeight;
    var a4H = 1050;
    if (contentH > a4H) {
      var scale = a4H / contentH;
      doc.style.transform = "scale(" + scale.toFixed(3) + ")";
      doc.style.transformOrigin = "top left";
      doc.style.width = (100 / scale).toFixed(1) + "%";
    }
  }
  window.print();
  setTimeout(function() {
    if (doc) {
      doc.style.transform = "";
      doc.style.width = "";
    }
  }, 1000);
}

function showNotFound() {
  document.getElementById("heroArea").innerHTML="";
  document.getElementById("mainArea").innerHTML=
    '<div class="not-found"><div class="not-found-icon">📋</div><div class="not-found-title">詳細情報がまだ登録されていません</div><div class="not-found-text">この大会の参加計画は準備中です。</div></div>';
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const targetId = params.get("id") || "";
  
  if(!targetId){
    document.getElementById("mainArea").innerHTML='<div class="not-found"><div class="not-found-icon">❓</div><div class="not-found-title">大会が指定されていません</div><div class="not-found-text"><a href="?page=index" style="color:var(--accent)">予定表に戻る</a></div></div>';
    return;
  }
  
  try{
    const csv=await getCSV(DETAIL_CSV_URL);
    const rows=parseCSV(csv);
    if(rows.length<2){showNotFound();return;}
    
    // ヘッダー行を見て列の場所を特定
    mapColumns(rows[0]);
    
    const found = rows.slice(1).find(function(r){
      return r[DCOL.id] === targetId; 
    });
    
    if(found){renderDetail(found);}
    else{showNotFound();}
  }catch(e){
    console.error(e);
    document.getElementById("mainArea").innerHTML=
      '<div class="status-box"><div style="font-size:1.4rem;margin-bottom:8px">⚠️</div><div>データの取得に失敗しました</div><div style="font-size:.75rem;margin-top:8px;color:#e05252">'+esc(e.message)+'</div></div>';
  }
}

window.addEventListener("DOMContentLoaded",init);
</script>
</body>
