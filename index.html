<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部活動予定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0a1628; --blue:#1a3a6b; --accent:#e8a020;
    --white:#fff; --light:#f4f6f9; --gray:#8a96a8;
    --border:#dde3ed; --text:#1e2a3a;
    --shadow:0 4px 24px rgba(10,22,40,.12);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--light);color:var(--text);min-height:100vh}

  /* HEADER */
  header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4)}
  .header-inner{max-width:900px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:14px}
  .header-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .header-title{font-family:'Oswald',sans-serif;font-size:1.15rem;color:var(--white);letter-spacing:.06em}
  .header-sub{font-size:.72rem;color:var(--gray);letter-spacing:.04em;display:block;margin-top:1px}
  .header-badge{margin-left:auto;background:var(--accent);color:var(--navy);font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}

  /* HERO */
  .hero{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);padding:36px 20px 44px;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(60deg,transparent,transparent 28px,rgba(255,255,255,.025) 28px,rgba(255,255,255,.025) 29px)}
  .hero-title{font-family:'Oswald',sans-serif;font-size:clamp(1.6rem,6vw,2.6rem);font-weight:700;color:var(--white);line-height:1.2;position:relative}
  .hero-title span{color:var(--accent)}
  .hero-label{font-size:.78rem;color:rgba(255,255,255,.55);letter-spacing:.1em;margin-top:6px;position:relative}
  .hero-stats{display:flex;justify-content:center;gap:24px;margin-top:24px;position:relative}
  .stat{text-align:center}
  .stat-num{font-family:'Oswald',sans-serif;font-size:1.9rem;font-weight:600;color:var(--accent);line-height:1}
  .stat-label{font-size:.68rem;color:rgba(255,255,255,.5);margin-top:3px;letter-spacing:.05em}
  .stat-div{width:1px;background:rgba(255,255,255,.15);align-self:stretch}

  /* NOTICE */
  .notice-wrap{max-width:900px;margin:-16px auto 0;padding:0 20px;position:relative;z-index:10}
  .notice-card{background:var(--accent);color:var(--navy);border-radius:10px;padding:11px 16px;font-size:.82rem;font-weight:700;display:flex;align-items:flex-start;gap:10px;box-shadow:0 6px 20px rgba(232,160,32,.35);animation:slideDown .4s ease both}
  @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

  /* MAIN */
  .main{max-width:900px;margin:0 auto;padding:28px 20px 60px}
  .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sec-line{width:4px;height:20px;background:var(--accent);border-radius:2px}
  .sec-title{font-family:'Oswald',sans-serif;font-size:.95rem;letter-spacing:.08em;color:var(--navy)}

  /* CARDS */
  .schedule-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
  .card{background:var(--white);border-radius:12px;padding:15px 16px;display:flex;gap:14px;align-items:flex-start;box-shadow:0 2px 10px rgba(10,22,40,.07);border-left:4px solid transparent;transition:transform .15s,box-shadow .15s;animation:fadeUp .4s ease both}
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .card.type-match   {border-left-color:#e05252}
  .card.type-practice{border-left-color:#3a9e6a}
  .card.type-rest    {border-left-color:var(--gray)}
  .card.type-event   {border-left-color:#4a7fd4}
  .card.type-other      {border-left-color:#b0768a}
  .card.type-scrimmage  {border-left-color:#d4a017}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* DATE BLOCK */
  .date-block{min-width:46px;text-align:center;flex-shrink:0}
  .date-day{font-family:'Oswald',sans-serif;font-size:1.6rem;font-weight:700;color:var(--navy);line-height:1}
  .date-mon{font-size:.68rem;color:var(--gray);margin-bottom:3px}
  .date-dow{font-size:.68rem;font-weight:700;padding:2px 5px;border-radius:4px;display:inline-block}
  .dow-sun{background:#ffe5e5;color:#c0392b}
  .dow-sat{background:#e5eeff;color:#2563b0}
  .dow-wk {background:var(--light);color:var(--gray)}
  .div-v{width:1px;min-height:44px;background:var(--border);flex-shrink:0;align-self:stretch}

  /* INFO */
  .card-info{flex:1;min-width:0}
  .card-top{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:5px}
  .type-badge{font-size:.67rem;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:1px}
  .badge-match   {background:#fdeaea;color:#b33030}
  .badge-practice{background:#e6f7ee;color:#227a4a}
  .badge-rest    {background:#f0f0f0;color:#666}
  .badge-event   {background:#e5eeff;color:#2555a0}
  .badge-other      {background:#f5e8ee;color:#8a3055}
  .badge-scrimmage  {background:#fff8dc;color:#8a6000}
  .target-badge{font-size:.67rem;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:1px}
  .target-all    {background:#e8f5e9;color:#2e7d32}
  .target-female {background:#fce4ec;color:#ad1457}
  .target-male   {background:#e3f2fd;color:#1565c0}
  .target-limit  {background:#fff3e0;color:#e65100}
  .card-title{font-size:.95rem;font-weight:700;color:var(--text)}
  .card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
  .meta-label{font-weight:700;color:var(--navy);margin-right:2px}
  .meta-pill{font-size:.73rem;color:var(--gray);display:flex;align-items:center;gap:3px}
  .card-detail{margin-top:7px;padding:7px 10px;background:var(--light);border-radius:7px;font-size:.78rem;color:#4a5a6a;line-height:1.6}

  /* BUTTONS */
  .btn-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:32px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:700;text-decoration:none;transition:opacity .15s;flex:1;min-width:180px;justify-content:center}
  .btn:hover{opacity:.85}
  .btn-absent{background:#e05252;color:#fff}
  .btn-car   {background:#4a7fd4;color:#fff}

  /* NOTES */
  .notes-card{background:var(--white);border-radius:12px;padding:18px 20px;box-shadow:0 2px 10px rgba(10,22,40,.07);margin-bottom:32px}
  .notes-list{list-style:none;display:flex;flex-direction:column;gap:9px;margin-top:4px}
  .notes-list li{display:flex;gap:9px;font-size:.84rem;line-height:1.6;color:#3a4a5a}
  .notes-list li::before{content:'●';color:var(--accent);font-size:.58rem;margin-top:6px;flex-shrink:0}

  /* CONTACT */
  .contact-card{background:var(--navy);border-radius:12px;padding:18px 20px;color:var(--white)}
  .contact-row{display:flex;align-items:flex-start;gap:10px;font-size:.82rem;color:rgba(255,255,255,.75);margin-top:9px}

  /* STATUS */
  .status-box{background:var(--white);border-radius:12px;padding:40px 20px;text-align:center;color:var(--gray);font-size:.88rem;box-shadow:0 2px 10px rgba(10,22,40,.07)}
  .spinner{display:inline-block;width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .updated{font-size:.7rem;color:var(--gray);text-align:right;margin-bottom:6px}

  /* SETUP */
  .setup-card{background:#fff8e1;border:2px dashed var(--accent);border-radius:12px;padding:18px 20px;margin-bottom:20px}
  .setup-card h3{font-size:.92rem;color:var(--navy);margin-bottom:8px}
  .setup-card p{font-size:.82rem;color:#555;line-height:1.7}
  .setup-card code{background:#f0e0b0;padding:1px 6px;border-radius:4px;font-size:.78rem;word-break:break-all}

  footer{text-align:center;padding:20px;font-size:.7rem;color:var(--gray);border-top:1px solid var(--border)}

  /* ── CALENDAR ── */
  .cal-wrap{background:var(--white);border-radius:14px;box-shadow:0 2px 10px rgba(10,22,40,.07);overflow:hidden;margin-bottom:20px}
  .cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy)}
  .cal-dow{text-align:center;font-size:.68rem;font-weight:700;color:rgba(255,255,255,.6);padding:8px 0;letter-spacing:.04em}
  .cal-dow.sun{color:#ff8a8a}
  .cal-dow.sat{color:#8ab4ff}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
  .cal-cell{background:var(--white);min-height:54px;padding:5px 4px 4px;cursor:pointer;position:relative;transition:background .12s}
  .cal-cell:hover{background:#f8f9ff}
  .cal-cell.empty{background:var(--light);cursor:default;pointer-events:none}
  .cal-cell.today .cal-date-num{background:var(--accent);color:var(--navy);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .cal-cell.selected{background:#fffbf0}
  .cal-cell.selected::after{content:'';position:absolute;inset:0;border:2px solid var(--accent);pointer-events:none}
  .cal-cell.sun .cal-date-num{color:#c0392b}
  .cal-cell.sat .cal-date-num{color:#2563b0}
  .cal-date-num{font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:600;color:var(--navy);line-height:1;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .cal-badges{display:flex;flex-wrap:wrap;gap:2px;margin-top:1px}
  .cal-badge{height:5px;border-radius:3px;flex:1;min-width:4px}
  .cal-badge.match    {background:#e05252}
  .cal-badge.scrimmage{background:#d4a017}
  .cal-badge.practice {background:#3a9e6a}
  .cal-badge.event    {background:#4a7fd4}
  .cal-badge.rest     {background:var(--gray)}
  .cal-badge.other    {background:#b0768a}
  .cal-detail{background:var(--white);border-radius:12px;padding:0;margin-bottom:24px;display:none;box-shadow:0 2px 10px rgba(10,22,40,.07)}
  .cal-detail.show{display:block;animation:fadeUp .25s ease both}
  .cal-detail-date{font-family:'Oswald',sans-serif;font-size:.95rem;color:var(--navy);padding:14px 16px 0;font-weight:600}

  /* ── PC LIST VIEW ── */
  .list-view{display:none;flex-direction:column;gap:0;margin-bottom:32px;background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(10,22,40,.07)}
  .list-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);transition:background .12s}
  .list-row:last-child{border-bottom:none}
  .list-row:hover{background:#fafbff}
  .list-date-col{min-width:72px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:3px solid transparent;flex-shrink:0}
  .list-date-col.match    {border-right-color:#e05252}
  .list-date-col.scrimmage{border-right-color:#d4a017}
  .list-date-col.practice {border-right-color:#3a9e6a}
  .list-date-col.event    {border-right-color:#4a7fd4}
  .list-date-col.rest     {border-right-color:var(--gray)}
  .list-date-col.other    {border-right-color:#b0768a}
  .list-day{font-family:'Oswald',sans-serif;font-size:1.6rem;font-weight:700;color:var(--navy);line-height:1}
  .list-dow{font-size:.68rem;font-weight:700;padding:2px 5px;border-radius:4px;margin-top:3px;display:inline-block}
  .list-content{flex:1;padding:14px 16px;min-width:0}
  .list-content-top{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:6px}
  .list-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .list-detail{margin-top:6px;padding:6px 10px;background:var(--light);border-radius:6px;font-size:.78rem;color:#4a5a6a;line-height:1.6}
  .list-today .list-date-col{background:#fffbf0}
  .list-today .list-day{color:var(--accent)}

  @media(min-width:769px){
    .cal-wrap{display:none}
    .cal-detail{display:none!important}
    .list-view{display:flex}
  }
  @media(max-width:768px){
    .list-view{display:none!important}
  }

  /* ── CALENDAR ── */
  .cal-wrap{background:var(--white);border-radius:14px;box-shadow:0 2px 10px rgba(10,22,40,.07);overflow:hidden;margin-bottom:20px}
  .cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy)}
  .cal-dow{text-align:center;font-size:.68rem;font-weight:700;color:rgba(255,255,255,.6);padding:8px 0;letter-spacing:.04em}
  .cal-dow.sun{color:#ff8a8a}
  .cal-dow.sat{color:#8ab4ff}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
  .cal-cell{background:var(--white);min-height:52px;padding:5px 4px 4px;cursor:pointer;position:relative;transition:background .12s}
  .cal-cell:hover{background:#f8f9ff}
  .cal-cell.empty{background:var(--light);cursor:default}
  .cal-cell.today .cal-date{background:var(--accent);color:var(--navy);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .cal-cell.selected{background:#fffbf0}
  .cal-cell.selected::after{content:'';position:absolute;inset:0;border:2px solid var(--accent);border-radius:0;pointer-events:none}
  .cal-cell.sun .cal-date{color:#c0392b}
  .cal-cell.sat .cal-date{color:#2563b0}
  .cal-date{font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:600;color:var(--navy);line-height:1;margin-bottom:3px}
  .cal-badges{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
  .cal-badge{height:5px;border-radius:3px;flex:1;min-width:5px;max-width:100%}
  .cal-badge.match    {background:#e05252}
  .cal-badge.scrimmage{background:#d4a017}
  .cal-badge.practice {background:#3a9e6a}
  .cal-badge.event    {background:#4a7fd4}
  .cal-badge.rest     {background:var(--gray)}
  .cal-badge.other    {background:#b0768a}

  /* 選択日の詳細パネル */
  .cal-detail{background:var(--light);border-radius:12px;padding:14px 16px;margin-bottom:24px;display:none}
  .cal-detail.show{display:block;animation:fadeUp .25s ease both}
  .cal-detail-date{font-family:'Oswald',sans-serif;font-size:1rem;color:var(--navy);margin-bottom:10px;font-weight:600}
  #monthSelector option{background:var(--navy);color:var(--white)}

  @media(max-width:480px){
    .hero{padding:26px 14px 36px}
    .hero-stats{gap:16px}
    .card{gap:10px;padding:13px}
    .date-day{font-size:1.35rem}
    .btn{min-width:140px;font-size:.8rem;padding:11px 14px}
  }
</style>
</head>

<header>
  <div class="header-inner">
    <div class="header-icon">🎾</div>
    <div>
      <div class="header-title" id="clubNameHeader"></div>
      <span class="header-sub" id="schoolNameSub"></span>
    </div>
    <select id="monthSelector" onchange="applyMonthFilter()"
      style="background:var(--accent);color:var(--navy);font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:20px;border:none;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;text-align:center;">
      <option value="">読み込み中…</option>

</header>

<div class="hero">

    <div class="stat"><div class="stat-num" id="statPractice">-</div><div class="stat-label">練習日</div></div>

  </div>
</div>

<div class="notice-wrap" id="noticeWrap" style="display:none">
  <div class="notice-card">
    <span>📢</span>
    <span id="noticeText"></span>
  </div>
</div>

<div class="main">
  <div id="setupGuide" style="display:none;margin-top:20px">
    <div class="setup-card">
      <h3>⚙️ スプレッドシートのURLを設定してください</h3>

    </div>
  </div>

  <!-- 欠席・配車ボタン -->
  <div class="btn-wrap" id="btnWrap" style="margin-top:24px;display:none">
    <a class="btn btn-absent" id="btnAbsent" href="#" target="_blank">📝 欠席・遅刻連絡</a>
    <a class="btn btn-car"    id="btnCar"    href="#" target="_blank">🚗 配車連絡</a>
  </div>

  <!-- 予定リスト -->
  <div style="margin-top:24px">
    <div class="sec-head">
      <div class="sec-line"></div>
      <div class="sec-title">SCHEDULE — 今後の予定</div>
    </div>

    <!-- カレンダーグリッド -->
    <div class="cal-wrap" id="calWrap">
      <div class="cal-dow-row">
        <div class="cal-dow sun">日</div>
        <div class="cal-dow">月</div>
        <div class="cal-dow">火</div>
        <div class="cal-dow">水</div>
        <div class="cal-dow">木</div>
        <div class="cal-dow">金</div>
        <div class="cal-dow sat">土</div>
      </div>
      <div class="cal-grid" id="calGrid">

    <div class="cal-detail" id="calDetail">
      <div class="cal-detail-date" id="calDetailDate"></div>
      <div class="schedule-list" id="scheduleList" style="padding:10px 0 4px;margin-bottom:0"></div>
    </div>
    <!-- リスト型（PC用） -->
    <div class="list-view" id="listView"></div>
  </div>

  <!-- 連絡事項 -->
  <div class="sec-head"><div class="sec-line"></div><div class="sec-title">NOTES — 連絡事項</div></div>
  <div class="notes-card"><ul class="notes-list" id="notesList"></ul></div>

  <!-- 問い合わせ -->
  <div class="sec-head"><div class="sec-line"></div><div class="sec-title">CONTACT — 問い合わせ</div></div>
  <div class="contact-card">
    <div style="font-size:.75rem;color:rgba(255,255,255,.45);letter-spacing:.06em">顧問 / COACH</div>
    <div style="font-size:1rem;font-weight:700;margin-top:3px" id="coachName"></div>
    <div class="contact-row"><span>📱</span><span id="lineInfo"></span></div>
    <div class="contact-row"><span>✉️</span><span id="emailInfo"></span></div>
  </div>
</div>

<footer id="footer"></footer>

<script>
const DOW_JP  = ["日","月","火","水","木","金","土"];
const DOW_CLS = ["dow-sun","dow-wk","dow-wk","dow-wk","dow-wk","dow-wk","dow-sat"];

// F列「内容」（＝種別）の値を直接判定
// スプレッドシートに入力する値: 大会 / 練習 / 合同練習 / 休養 / その他
const TYPE_MAP = {
  // 実際のF列の値に合わせた定義
  "部活動":       "practice",
  "大会":         "match",
  "練習試合":     "scrimmage",
  "保護者会練習": "event",
  "部活動休養日": "rest",
};
function detectType(typeVal) {
  const t = (typeVal||"").trim();
  if (TYPE_MAP[t]) return TYPE_MAP[t];
  // フォールバック（表記ゆれ対策）
  if (/大会|選手権|地区大|春季|秋季|新人戦/.test(t)) return "match";
  if (/練習試合|試合/.test(t)) return "scrimmage";
  if (/保護者|合同|交流|招待/.test(t)) return "event";
  if (/休養|休み|オフ/.test(t)) return "rest";
  if (/部活|練習/.test(t)) return "practice";
  return "other";
}
const TYPE_LABEL = { match:"大会", practice:"練習", event:"保護者会練習", rest:"休養", other:"その他", scrimmage:"練習試合" };
const TYPE_BADGE = { match:"badge-match", practice:"badge-practice", event:"badge-event", rest:"badge-rest", other:"badge-other", scrimmage:"badge-scrimmage" };

function parseCSV(text) {
  const rows = [];
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = []; let cur="", inQ=false;
    for (let i=0;i<line.length;i++) {
      const c=line[i];
      if (c==='"'&&!inQ) inQ=true;
      else if (c==='"'&&inQ) { if(line[i+1]==='"'){cur+='"';i++}else inQ=false; }
      else if (c===','&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=c;
    }
    cols.push(cur.trim()); rows.push(cols);
  }
  return rows;
}

function parseDate(str) {
  if (!str) return null;
  // 2026/04/05, 2026-04-05, 2026年4月5日 すべて対応
  // new Date("2026-04-05") はUTC解釈でタイムゾーンずれが起きるため
  // 年・月・日を取り出してローカル時刻で生成する
  const m = str.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
  if (!m) return null;
  const d = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
  return isNaN(d.getTime()) ? null : d;
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }

function buildCard(item, idx) {
  const date = parseDate(item.date);
  const day  = date ? date.getDate()  : "?";
  const mon  = date ? (date.getMonth()+1)+"月" : "";
  const dow  = date ? { t: DOW_JP[date.getDay()], c: DOW_CLS[date.getDay()] } : {t:"?",c:"dow-wk"};
  const type = detectType(item.type);
  const delay = Math.min(idx*0.06, 0.5);

  // 対象バッジのクラス判定
  const targetCls = {
    "全員":"target-all","女子のみ":"target-female",
    "男子のみ":"target-male","限定対象":"target-limit"
  }[item.target] || "target-all";

  // 時間表記
  const metas = [];
  if (item.startTime) metas.push(`<span class="meta-pill"><span class="meta-label">【集合時間】</span>${esc(item.startTime)}</span>`);
  if (item.endTime)   metas.push(`<span class="meta-pill"><span class="meta-label">【解散時間】</span>${esc(item.endTime)}</span>`);
  if (item.location)  metas.push(`<span class="meta-pill"><span class="meta-label">【場所】</span>${esc(item.location)}</span>`);

  // 詳細テキストの改行をbrに変換
  const detailHtml = item.detail
    ? esc(item.detail).replace(/\n/g, "<br>")
    : "";

  return `
  <div class="card type-${type}" style="animation-delay:${delay}s">
    <div class="date-block">
      <div class="date-mon">${mon}</div>
      <div class="date-day">${day}</div>
      <div class="date-dow ${dow.c}">${dow.t}</div>
    </div>
    <div class="div-v"></div>
    <div class="card-info">
      <div class="card-top">
        <span class="type-badge ${TYPE_BADGE[type]}">${TYPE_LABEL[type]}</span>
        ${item.target ? `<span class="target-badge ${targetCls}">${esc(item.target)}</span>` : ""}
      </div>
      ${metas.length ? `<div class="card-meta" style="margin-top:6px">${metas.join("")}</div>` : ""}
      ${detailHtml ? `<div class="card-detail">${detailHtml}</div>` : ""}
    </div>
  </div>`;
}

function init() {
  document.getElementById("clubNameHeader").textContent = CONFIG.clubName;
  document.getElementById("schoolNameSub").textContent  = CONFIG.schoolName;
  document.getElementById("coachName").textContent = CONFIG.coachName;
  document.getElementById("lineInfo").textContent  = `LINE グループ「${CONFIG.lineGroup}」にてお知らせ`;
  document.getElementById("emailInfo").textContent = CONFIG.email;
  document.getElementById("footer").textContent    = `© ${CONFIG.schoolName} ${CONFIG.clubName}`;
  CONFIG.notes.forEach(n => {
    const li = document.createElement("li");
    li.textContent = n;
    document.getElementById("notesList").appendChild(li);
  });
  // フォームボタン
  if (CONFIG.absentFormUrl || CONFIG.carFormUrl) {
    document.getElementById("btnWrap").style.display = "flex";
    if (CONFIG.absentFormUrl) document.getElementById("btnAbsent").href = CONFIG.absentFormUrl;
    if (CONFIG.carFormUrl)    document.getElementById("btnCar").href    = CONFIG.carFormUrl;
  }
  if (!SHEET_CSV_URL || SHEET_CSV_URL.includes("ここに")) {
    document.getElementById("setupGuide").style.display = "block";
    document.getElementById("scheduleList").innerHTML =
      `<div class="status-box">スプレッドシートのURLを設定するとここに予定が表示されます</div>`;
    document.getElementById("heroTitle").innerHTML = `<span style="font-size:1.2rem">設定待ち</span>`;
    document.getElementById("headerBadge").textContent = "未設定";
    return;
  }
  fetchData();
}

async function fetchData() {
  const list = document.getElementById("scheduleList");

  // タイムアウト付きfetchヘルパー
  async function fetchWithTimeout(url, ms) {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), ms);
    try {
      const r = await fetch(url, { signal: ctrl.signal });
      clearTimeout(tid);
      return r;
    } catch(e) {
      clearTimeout(tid);
      throw e;
    }
  }

  async function getCSV() {
    // 1. まず直接取得（Google公開CSVはCORS対応済み）
    try {
      const r = await fetchWithTimeout(SHEET_CSV_URL, 8000);
      if (r.ok) {
        const t = await r.text();
        if (t && t.includes(",")) return t;
      }
    } catch(e) { console.warn("direct fetch failed:", e.message); }

    // 2. プロキシ経由（直接取得が失敗した場合のみ）
    const proxies = [
      `https://corsproxy.io/?${encodeURIComponent(SHEET_CSV_URL)}`,
      `https://api.allorigins.win/get?url=${encodeURIComponent(SHEET_CSV_URL)}`,
    ];
    for (const url of proxies) {
      try {
        const r = await fetchWithTimeout(url, 8000);
        if (!r.ok) continue;
        const t = await r.text();
        // allorigins は JSON で返す
        try {
          const j = JSON.parse(t);
          if (j.contents && j.contents.includes(",")) return j.contents;
        } catch { }
        if (t && t.includes(",")) return t;
      } catch(e) { console.warn("proxy failed:", url, e.message); }
    }
    throw new Error("データを取得できませんでした。ネットワーク環境をご確認ください。");
  }

  try {
    const csv  = await getCSV();
    const rows = parseCSV(csv);
    if (rows.length < 2) throw new Error("シートにデータがありません");

    const today = new Date(); today.setHours(0,0,0,0);

    const allItems = rows.slice(1)
      .filter(r => r.length > COL.date && r[COL.date])
      .map(r => ({
        target:    r[COL.target]    || "",
        date:      r[COL.date]      || "",
        startTime: r[COL.startTime] || "",
        endTime:   r[COL.endTime]   || "",
        type:      r[COL.type]      || "",
        location:  r[COL.location]  || "",
        detail:    r[COL.detail]    || "",
      }));

        const items = allItems
      .filter(item => { const d = parseDate(item.date); return d && d >= today; })
      .sort((a,b) => (parseDate(a.date)||0) - (parseDate(b.date)||0));

    if (items.length === 0) {
      const hint = allItems.length > 0
        ? `今後の予定はありません<br><small style="color:var(--gray)">取得済み ${allItems.length}件 ／ 上のデバッグ情報をご確認ください</small>`
        : "データが空です";
      list.innerHTML = `<div class="status-box">${hint}</div>`;
      document.getElementById("heroTitle").innerHTML = `<span>予定なし</span>`;
      document.getElementById("headerBadge").textContent = "予定0件";
      return;
    }

    // 月リストを生成してselectorにセット
    const months = [...new Set(
      allItems.map(i => {
        const d = parseDate(i.date);
        return d ? `${d.getFullYear()}-${d.getMonth()+1}` : null;
      }).filter(Boolean)
    )].sort();

    const sel = document.getElementById("monthSelector");
    sel.innerHTML = months.map(m => {
      const [y,mo] = m.split("-");
      return `<option value="${m}">${y}年${mo}月</option>`;
    }).join("");

    // 今月 or 直近の月をデフォルト選択
    const todayM = `${today.getFullYear()}-${today.getMonth()+1}`;
    const defaultM = months.includes(todayM) ? todayM : months[0];
    sel.value = defaultM;

    // グローバルにallItemsを保持して月フィルタで使う
    window._allItems = allItems;
    renderMonth(defaultM);

    // 初回レンダリングはrenderMonth側で行う
    document.getElementById("updated").textContent = `最終取得：${new Date().toLocaleString("ja-JP")}`;

  } catch(e) {
    console.error(e);
    list.innerHTML = `
      <div class="status-box">
        <div style="font-size:1.4rem;margin-bottom:8px">⚠️</div>
        <div style="margin-bottom:4px">データの取得に失敗しました</div>
        <div style="font-size:.75rem;margin-bottom:12px;color:#e05252">${e.message}</div>
        <button onclick="fetchData()"
          style="padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:var(--navy);font-weight:700;cursor:pointer;font-size:.85rem">
          再試行
        </button>
      </div>`;
  }
}
// 月別カレンダー描画
function renderMonth(monthKey) {
  const [y, mo] = monthKey.split("-").map(Number);
  const today   = new Date(); today.setHours(0,0,0,0);

  const items = (window._allItems || [])
    .filter(item => {
      const d = parseDate(item.date);
      return d && d.getFullYear() === y && (d.getMonth()+1) === mo;
    });

  // ヒーロー・統計
  document.getElementById("heroTitle").innerHTML = `<span>${mo}</span>月予定`;
  document.getElementById("statPractice").textContent  = items.filter(i=>detectType(i.type)==="practice").length;
  document.getElementById("statMatch").textContent     = items.filter(i=>detectType(i.type)==="match").length;
  document.getElementById("statScrimmage").textContent = items.filter(i=>detectType(i.type)==="scrimmage").length;
  document.getElementById("statParents").textContent   = items.filter(i=>detectType(i.type)==="event").length;

  // お知らせ
  const nextEvent = items
    .filter(i => detectType(i.type)==="match" || detectType(i.type)==="scrimmage")
    .sort((a,b)=>(parseDate(a.date)||0)-(parseDate(b.date)||0))[0];
  if (nextEvent) {
    const d  = parseDate(nextEvent.date);
    const ds = d ? `${d.getMonth()+1}月${d.getDate()}日（${DOW_JP[d.getDay()]}）` : nextEvent.date;
    document.getElementById("noticeText").textContent =
      `📅 ${TYPE_LABEL[detectType(nextEvent.type)]}：${ds}${nextEvent.startTime?" 集合 "+nextEvent.startTime:""}`;
    document.getElementById("noticeWrap").style.display = "block";
  } else {
    document.getElementById("noticeWrap").style.display = "none";
  }

  // 日付→予定のマップ
  const dayMap = {};
  items.forEach(item => {
    const d = parseDate(item.date);
    if (!d) return;
    const key = d.getDate();
    if (!dayMap[key]) dayMap[key] = [];
    dayMap[key].push(item);
  });

  // カレンダーグリッド生成
  const firstDay = new Date(y, mo-1, 1).getDay(); // 0=日
  const lastDate = new Date(y, mo, 0).getDate();
  const grid = document.getElementById("calGrid");
  let html = "";

  // 月初の空白セル
  for (let i=0; i<firstDay; i++) html += `<div class="cal-cell empty"></div>`;

  for (let d=1; d<=lastDate; d++) {
    const date  = new Date(y, mo-1, d);
    const dow   = date.getDay();
    const isToday = date.getTime() === today.getTime();
    const events  = dayMap[d] || [];
    const dowCls  = dow===0 ? "sun" : dow===6 ? "sat" : "";
    const todayCls = isToday ? " today" : "";
    const badges  = events.map(ev =>
      `<div class="cal-badge ${detectType(ev.type)}"></div>`
    ).join("");

    html += `<div class="cal-cell${todayCls} ${dowCls}" onclick="selectDay(${y},${mo},${d})">
      <div class="cal-date-num">${d}</div>
      <div class="cal-badges">${badges}</div>
    </div>`;
  }

  // 末尾の空白
  const total = firstDay + lastDate;
  const remainder = total % 7;
  if (remainder > 0) {
    for (let i=0; i<7-remainder; i++) html += `<div class="cal-cell empty"></div>`;
  }

  grid.innerHTML = html;

  // 詳細パネルを閉じる
  document.getElementById("calDetail").classList.remove("show");
  document.getElementById("scheduleList").innerHTML = "";

  // PC用リストビューを描画
  renderListView(y, mo, items);
}

function renderListView(y, mo, items) {
  const listView = document.getElementById("listView");
  if (!listView) return;
  const today = new Date(); today.setHours(0,0,0,0);

  if (items.length === 0) {
    listView.innerHTML = `<div class="status-box" style="border-radius:14px">この月の予定はありません</div>`;
    return;
  }

  const sorted = [...items].sort((a,b)=>(parseDate(a.date)||0)-(parseDate(b.date)||0));
  listView.innerHTML = sorted.map(item => {
    const date    = parseDate(item.date);
    const day     = date ? date.getDate() : "?";
    const mon     = date ? (date.getMonth()+1)+"月" : "";
    const dow     = date ? DOW_JP[date.getDay()] : "?";
    const dowCls  = date ? (date.getDay()===0?"dow-sun":date.getDay()===6?"dow-sat":"dow-wk") : "dow-wk";
    const isToday = date && date.getTime()===today.getTime();
    const type    = detectType(item.type);

    const targetCls = {"全員":"target-all","女子のみ":"target-female","男子のみ":"target-male","限定対象":"target-limit"}[item.target]||"target-all";

    const metas = [];
    if (item.startTime) metas.push(`<span class="meta-pill"><span class="meta-label">【集合時間】</span>${esc(item.startTime)}</span>`);
    if (item.endTime)   metas.push(`<span class="meta-pill"><span class="meta-label">【解散時間】</span>${esc(item.endTime)}</span>`);
    if (item.location)  metas.push(`<span class="meta-pill"><span class="meta-label">【場所】</span>${esc(item.location)}</span>`);
    const detailHtml = item.detail ? esc(item.detail).replace(/
/g,"<br>") : "";

    return `<div class="list-row${isToday?" list-today":""}">
      <div class="list-date-col ${type}">
        <div class="list-day">${day}</div>
        <div class="list-dow ${dowCls}">${dow}</div>
      </div>
      <div class="list-content">
        <div class="list-content-top">
          <span class="type-badge ${TYPE_BADGE[type]}">${TYPE_LABEL[type]}</span>
          ${item.target?`<span class="target-badge ${targetCls}">${esc(item.target)}</span>`:""}
        </div>
        ${metas.length?`<div class="list-meta">${metas.join("")}</div>`:""}
        ${detailHtml?`<div class="list-detail">${detailHtml}</div>`:""}
      </div>
    </div>`;
  }).join("");
}

// 日付タップ → 詳細表示
function selectDay(y, mo, d) {
  // 選択状態のリセット
  document.querySelectorAll(".cal-cell.selected").forEach(el => el.classList.remove("selected"));
  // クリックしたセルを選択
  event.currentTarget.classList.add("selected");

  const date    = new Date(y, mo-1, d);
  const dow     = DOW_JP[date.getDay()];
  const dayMap  = {};
  (window._allItems || []).forEach(item => {
    const dd = parseDate(item.date);
    if (!dd) return;
    const key = `${dd.getFullYear()}-${dd.getMonth()+1}-${dd.getDate()}`;
    if (!dayMap[key]) dayMap[key] = [];
    dayMap[key].push(item);
  });

  const key    = `${y}-${mo}-${d}`;
  const events = dayMap[key] || [];
  const detail = document.getElementById("calDetail");
  const list   = document.getElementById("scheduleList");

  document.getElementById("calDetailDate").textContent =
    `${mo}月${d}日（${dow}）の予定`;

  if (events.length === 0) {
    list.innerHTML = `<div style="padding:12px 16px 16px;font-size:.85rem;color:var(--gray)">この日の予定はありません</div>`;
  } else {
    list.innerHTML = events.map((item,i) => buildCard(item,i)).join("");
  }

  detail.classList.add("show");
  // スクロールして詳細を見せる
  setTimeout(() => detail.scrollIntoView({ behavior:"smooth", block:"nearest" }), 50);
}

function applyMonthFilter() {
  const sel = document.getElementById("monthSelector");
  if (sel.value) renderMonth(sel.value);
}

window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
