<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部活動予定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--blue:#1a3a6b;--accent:#e8a020;--white:#fff;--light:#f4f6f9;--gray:#8a96a8;--border:#dde3ed;--text:#1e2a3a}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--light);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4)}
.header-inner{max-width:960px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:14px}
.header-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-text{flex:1;min-width:0}
.header-title{font-family:'Oswald',sans-serif;font-size:1.1rem;color:var(--white);letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:.7rem;color:var(--gray);display:block;margin-top:1px}
#monthSelector{background:var(--accent);color:var(--navy);font-size:.75rem;font-weight:700;padding:5px 12px;border-radius:20px;border:none;cursor:pointer;outline:none;flex-shrink:0}
#monthSelector option{background:var(--navy);color:var(--white)}

/* HERO */
.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);padding:32px 20px 40px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(60deg,transparent,transparent 28px,rgba(255,255,255,.025) 28px,rgba(255,255,255,.025) 29px)}
.hero-title{font-family:'Oswald',sans-serif;font-size:clamp(1.8rem,7vw,3rem);font-weight:700;color:var(--white);line-height:1.1;position:relative}
.hero-title span{color:var(--accent)}
.hero-label{font-size:.75rem;color:rgba(255,255,255,.5);letter-spacing:.1em;margin-top:5px;position:relative}
.hero-stats{display:flex;justify-content:center;margin-top:22px;position:relative}
.stat{text-align:center;padding:0 14px;border-right:1px solid rgba(255,255,255,.15)}
.stat:last-child{border-right:none}
.stat-num{font-family:'Oswald',sans-serif;font-size:1.7rem;font-weight:600;color:var(--accent);line-height:1}
.stat-label{font-size:.62rem;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.04em}

/* NOTICE */
.notice-wrap{max-width:960px;margin:-16px auto 0;padding:0 20px;position:relative;z-index:10}
.notice-card{background:var(--accent);color:var(--navy);border-radius:10px;padding:11px 16px;font-size:.82rem;font-weight:700;display:flex;align-items:flex-start;gap:10px;box-shadow:0 6px 20px rgba(232,160,32,.35)}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:24px 20px 60px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:28px}
.sec-line{width:4px;height:20px;background:var(--accent);border-radius:2px}
.sec-title{font-family:'Oswald',sans-serif;font-size:.95rem;letter-spacing:.08em;color:var(--navy)}
.updated{display:none}

/* BUTTONS */
.btn-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:10px;font-size:.85rem;font-weight:700;text-decoration:none;transition:opacity .15s;flex:1;min-width:160px;justify-content:center}
.btn:hover{opacity:.85}
.btn-absent{background:#e05252;color:#fff}
.btn-car{background:#4a7fd4;color:#fff}

/* STATUS */
.status-box{background:var(--white);border-radius:12px;padding:40px 20px;text-align:center;color:var(--gray);font-size:.88rem;box-shadow:0 2px 10px rgba(10,22,40,.07)}
.spinner{display:inline-block;width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* BADGES */
.type-badge{font-size:.67rem;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.badge-match    {background:#fdeaea;color:#b33030}
.badge-scrimmage{background:#fff8dc;color:#8a6000}
.badge-practice {background:#e6f7ee;color:#227a4a}
.badge-event    {background:#e5eeff;color:#2555a0}
.badge-rest     {background:#f0f0f0;color:#666}
.badge-other    {background:#f5e8ee;color:#8a3055}
.target-badge{font-size:.67rem;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.target-all   {background:#e8f5e9;color:#2e7d32}
.target-female{background:#fce4ec;color:#ad1457}
.target-male  {background:#e3f2fd;color:#1565c0}
.target-limit {background:#fff3e0;color:#e65100}
.meta-label{font-weight:700;color:var(--navy);margin-right:2px;font-size:.72rem}
.meta-pill{font-size:.73rem;color:var(--gray);display:inline-flex;align-items:center}
.card-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:5px}
.card-detail{margin-top:7px;padding:7px 10px;background:var(--light);border-radius:7px;font-size:.78rem;color:#4a5a6a;line-height:1.6}
.dow-sun{background:#ffe5e5;color:#c0392b}
.dow-sat{background:#e5eeff;color:#2563b0}
.dow-wk {background:var(--light);color:var(--gray)}

/* CALENDAR */
.cal-wrap{background:var(--white);border-radius:14px;box-shadow:0 2px 10px rgba(10,22,40,.07);overflow:hidden}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy)}
.cal-dow{text-align:center;font-size:.68rem;font-weight:700;color:rgba(255,255,255,.6);padding:8px 0}
.cal-dow.sun{color:#ff8a8a}.cal-dow.sat{color:#8ab4ff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-cell{background:var(--white);min-height:54px;padding:5px 4px 4px;cursor:default;position:relative;transition:background .12s}
.cal-cell.has-event{cursor:pointer}
.cal-cell.has-event:hover{background:#f0f4ff}
.cal-cell.empty{background:#f8f9fb;cursor:default;pointer-events:none}
.cal-cell.today{background:#fff8e6}.cal-cell.today .cal-dn{color:#8a5a00;font-weight:700}
.cal-cell.selected{background:#fff3d0}
.cal-cell.selected::after{content:'';position:absolute;inset:0;border:2px solid var(--accent);pointer-events:none}
.cal-cell.sun .cal-dn{color:#c0392b}
.cal-cell.sat .cal-dn{color:#2563b0}
.cal-dn{font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:600;color:var(--navy);width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-badges{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.cal-badge{height:5px;border-radius:3px;flex:1;min-width:4px}
.cal-badge.match    {background:#e05252}
.cal-badge.scrimmage{background:#d4a017}
.cal-badge.practice {background:#3a9e6a}
.cal-badge.event    {background:#4a7fd4}
.cal-badge.rest     {background:var(--gray)}
.cal-badge.other    {background:#b0768a}
.cal-detail{background:var(--white);border-radius:12px;margin-top:12px;display:none;box-shadow:0 2px 10px rgba(10,22,40,.07);overflow:hidden}
.cal-detail.show{display:block;animation:fadeUp .25s ease both}
.cal-detail-date{font-family:'Oswald',sans-serif;font-size:.95rem;color:var(--navy);padding:14px 16px 8px;font-weight:600;border-bottom:1px solid var(--border)}
.detail-cards{padding:8px 12px 12px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--light);border-radius:10px;padding:12px 14px;border-left:4px solid var(--border)}
.card.match    {border-left-color:#e05252}
.card.scrimmage{border-left-color:#d4a017}
.card.practice {border-left-color:#3a9e6a}
.card.event    {border-left-color:#4a7fd4}
.card.rest     {border-left-color:var(--gray)}
.card.other    {border-left-color:#b0768a}
.card-top{display:flex;gap:7px;align-items:flex-start;flex-wrap:wrap;margin-bottom:5px}

/* LIST VIEW（PC） */
.list-view{display:none;flex-direction:column;background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(10,22,40,.07)}
.list-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border)}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:#fafbff}
.list-date-col{min-width:70px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:3px solid var(--border);flex-shrink:0}
.list-date-col.match    {border-right-color:#e05252}
.list-date-col.scrimmage{border-right-color:#d4a017}
.list-date-col.practice {border-right-color:#3a9e6a}
.list-date-col.event    {border-right-color:#4a7fd4}
.list-date-col.rest     {border-right-color:var(--gray)}
.list-date-col.other    {border-right-color:#b0768a}
.list-day{font-family:'Oswald',sans-serif;font-size:1.55rem;font-weight:700;color:var(--navy);line-height:1}
.list-dow{font-size:.67rem;font-weight:700;padding:2px 5px;border-radius:4px;margin-top:3px;display:inline-block}
.list-content{flex:1;padding:14px 16px;min-width:0}
.list-top{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:5px}
.list-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.list-today .list-date-col{background:#fffbf0}
.list-today .list-day{color:var(--accent)}

/* NOTES / CONTACT */
.notes-card{background:var(--white);border-radius:12px;padding:18px 20px;box-shadow:0 2px 10px rgba(10,22,40,.07);margin-bottom:28px}
.notes-list{list-style:none;display:flex;flex-direction:column;gap:9px;margin-top:4px}
.notes-list li{display:flex;gap:9px;font-size:.84rem;line-height:1.6;color:#3a4a5a}
.notes-list li::before{content:'●';color:var(--accent);font-size:.58rem;margin-top:6px;flex-shrink:0}
.contact-card{background:var(--navy);border-radius:12px;padding:18px 20px;color:var(--white)}
.contact-row{display:flex;align-items:flex-start;gap:10px;font-size:.82rem;color:rgba(255,255,255,.75);margin-top:9px}
footer{text-align:center;padding:20px;font-size:.7rem;color:var(--gray);border-top:1px solid var(--border)}

/* RESPONSIVE */
@media(min-width:769px){
  .cal-wrap{display:none}.cal-detail{display:none!important}
  .list-view{display:flex}
}
@media(max-width:768px){
  .list-view{display:none!important}
  .stat{padding:0 10px}
  .stat-label{font-size:.58rem}
}
</style>

<script>
/* ── 定数 ── */
const DOW_JP  = ["日","月","火","水","木","金","土"];
const DOW_CLS = ["dow-sun","dow-wk","dow-wk","dow-wk","dow-wk","dow-wk","dow-sat"];

const TYPE_MAP = {
  "部活動":"practice","大会":"match","練習試合":"scrimmage",
  "保護者会練習":"event","部活動休養日":"rest"
};
const TYPE_LABEL = {
  practice:"部活動", match:"大会", scrimmage:"練習試合",
  event:"保護者会練習", rest:"休養", other:"その他"
};
const TYPE_BADGE = {
  practice:"badge-practice", match:"badge-match", scrimmage:"badge-scrimmage",
  event:"badge-event", rest:"badge-rest", other:"badge-other"
};
const TARGET_CLS = {
  "全員":"target-all","女子のみ":"target-female","男子のみ":"target-male","限定対象":"target-limit"
};

/* ── ユーティリティ ── */
function detectType(val) {
  const t = (val || "").trim();
  if (TYPE_MAP[t]) return TYPE_MAP[t];
  if (/大会|選手権|地区大|春季|秋季|新人戦/.test(t)) return "match";
  if (/練習試合/.test(t)) return "scrimmage";
  if (/保護者|合同|交流/.test(t)) return "event";
  if (/休養|休み|オフ/.test(t)) return "rest";
  if (/部活|練習/.test(t)) return "practice";
  return "other";
}

function parseDate(str) {
  if (!str) return null;
  // 2026/04/05, 2026-04-05, 2026年4月5日 に対応
  const m = str.match(/(\d{4}).(\d{1,2}).(\d{1,2})/);
  if (!m) return null;
  const d = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
  return isNaN(d.getTime()) ? null : d;
}

function esc(s) {
  return String(s || "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function parseCSV(text) {
  const rows = [];
  const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"' && !inQ) { inQ = true; }
      else if (c === '"' && inQ) { if (line[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

/* ── HTML生成 ── */
function buildBadgesHtml(item) {
  var type = detectType(item.type);
  var tcls = TARGET_CLS[item.target] || "target-all";
  var html = '<span class="type-badge ' + TYPE_BADGE[type] + '">' + TYPE_LABEL[type] + '</span>';
  if (item.target) html += '<span class="target-badge ' + tcls + '">' + esc(item.target) + '</span>';
  return html;
}

function buildMetaHtml(item) {
  var parts = [];
  if (item.startTime) parts.push('<span class="meta-pill"><span class="meta-label">【集合時間】</span>' + esc(item.startTime) + '</span>');
  if (item.endTime)   parts.push('<span class="meta-pill"><span class="meta-label">【解散時間】</span>' + esc(item.endTime) + '</span>');
  if (item.location)  parts.push('<span class="meta-pill"><span class="meta-label">【場所】</span>' + esc(item.location) + '</span>');
  return parts.length ? '<div class="card-meta">' + parts.join("") + '</div>' : "";
}

function buildCardHtml(item) {
  var type   = detectType(item.type);
  var detail = item.detail
    ? '<div class="card-detail">' + esc(item.detail).replace(/
/g, "<br>") + '</div>' : "";
  return '<div class="card ' + type + '">'
    + '<div class="card-top">' + buildBadgesHtml(item) + '</div>'
    + buildMetaHtml(item)
    + detail
    + '</div>';
}

/* ── FETCH ── */
async function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid); return r;
  } catch(e) { clearTimeout(tid); throw e; }
}

async function getCSV() {
  // 1. 直接取得
  try {
    const r = await fetchWithTimeout(SHEET_CSV_URL, 8000);
    if (r.ok) { const t = await r.text(); if (t && t.includes(",")) return t; }
  } catch(e) { console.warn("direct fetch:", e.message); }
  // 2. プロキシ
  const proxies = [
    "https://corsproxy.io/?" + encodeURIComponent(SHEET_CSV_URL),
    "https://api.allorigins.win/get?url=" + encodeURIComponent(SHEET_CSV_URL),
  ];
  for (const url of proxies) {
    try {
      const r = await fetchWithTimeout(url, 8000);
      if (!r.ok) continue;
      const t = await r.text();
      try {
        const j = JSON.parse(t);
        if (j.contents && j.contents.includes(",")) return j.contents;
      } catch(e) { /* not JSON */ }
      if (t && t.includes(",")) return t;
    } catch(e) { console.warn("proxy:", e.message); }
  }
  throw new Error("データを取得できませんでした");
}

/* ── レンダリング ── */
function renderMonth(monthKey) {
  const parts = monthKey.split("-");
  const y  = parseInt(parts[0]);
  const mo = parseInt(parts[1]);
  const today = new Date(); today.setHours(0, 0, 0, 0);

  const items = (window._allItems || []).filter(function(item) {
    const d = parseDate(item.date);
    return d && d.getFullYear() === y && (d.getMonth() + 1) === mo;
  });

  // ヒーロー
  document.getElementById("heroMon").textContent = mo;

  // 統計
  document.getElementById("statPractice").textContent  = items.filter(function(i){ return detectType(i.type) === "practice"; }).length;
  document.getElementById("statMatch").textContent     = items.filter(function(i){ return detectType(i.type) === "match"; }).length;
  document.getElementById("statScrimmage").textContent = items.filter(function(i){ return detectType(i.type) === "scrimmage"; }).length;
  document.getElementById("statParents").textContent   = items.filter(function(i){ return detectType(i.type) === "event"; }).length;

  // お知らせ
  const events = items.filter(function(i) {
    return detectType(i.type) === "match" || detectType(i.type) === "scrimmage";
  }).sort(function(a, b) { return (parseDate(a.date) || 0) - (parseDate(b.date) || 0); });
  if (events.length > 0) {
    const ne = events[0];
    const d  = parseDate(ne.date);
    const ds = d ? (d.getMonth()+1) + "月" + d.getDate() + "日（" + DOW_JP[d.getDay()] + "）" : ne.date;
    document.getElementById("noticeText").textContent =
      "📅 " + TYPE_LABEL[detectType(ne.type)] + "：" + ds + (ne.startTime ? " 集合 " + ne.startTime : "");
    document.getElementById("noticeWrap").style.display = "block";
  } else {
    document.getElementById("noticeWrap").style.display = "none";
  }

  renderCalendar(y, mo, items, today);
  renderList(items, today);

  // 詳細パネルを閉じる
  document.getElementById("calDetail").classList.remove("show");
}

function renderCalendar(y, mo, items, today) {
  const dayMap = {};
  items.forEach(function(item) {
    const d = parseDate(item.date);
    if (!d) return;
    const k = d.getDate();
    if (!dayMap[k]) dayMap[k] = [];
    dayMap[k].push(item);
  });

  const firstDow = new Date(y, mo - 1, 1).getDay();
  const lastDate = new Date(y, mo, 0).getDate();
  let html = "";

  for (let i = 0; i < firstDow; i++) {
    html += '<div class="cal-cell empty"></div>';
  }
  for (let d = 1; d <= lastDate; d++) {
    const date   = new Date(y, mo - 1, d);
    const dow    = date.getDay();
    const isT    = date.getTime() === today.getTime();
    const evs    = dayMap[d] || [];
    const dowCls = dow === 0 ? "sun" : dow === 6 ? "sat" : "";
    const todCls = isT ? " today" : "";
    const badges = evs.map(function(ev) {
      return '<div class="cal-badge ' + detectType(ev.type) + '"></div>';
    }).join("");
    var hasEv = (evs.length > 0) ? " has-event" : "";
    html += '<div class="cal-cell ' + dowCls + todCls + hasEv + '" ' + (evs.length > 0 ? 'onclick="selectDay(' + y + ',' + mo + ',' + d + ',this)"' : '') + '>'
      + '<div class="cal-dn">' + d + '</div>'
      + '<div class="cal-badges">' + badges + '</div>'
      + '</div>';
  }
  const rem = (firstDow + lastDate) % 7;
  if (rem > 0) {
    for (let i = 0; i < 7 - rem; i++) {
      html += '<div class="cal-cell empty"></div>';
    }
  }
  document.getElementById("calGrid").innerHTML = html;
}

function selectDay(y, mo, d, el) {
  document.querySelectorAll(".cal-cell.selected").forEach(function(c) { c.classList.remove("selected"); });
  el.classList.add("selected");

  const key = y + "-" + mo + "-" + d;
  const evs = (window._allItems || []).filter(function(item) {
    const dd = parseDate(item.date);
    if (!dd) return false;
    return (dd.getFullYear() + "-" + (dd.getMonth()+1) + "-" + dd.getDate()) === key;
  });

  const dow = DOW_JP[new Date(y, mo - 1, d).getDay()];
  document.getElementById("calDetailDate").textContent = mo + "月" + d + "日（" + dow + "）の予定";
  document.getElementById("detailCards").innerHTML = evs.length
    ? evs.map(buildCardHtml).join("")
    : '<div style="font-size:.84rem;color:var(--gray);padding:8px 0">この日の予定はありません</div>';

  const det = document.getElementById("calDetail");
  det.classList.add("show");
  setTimeout(function() { det.scrollIntoView({ behavior: "smooth", block: "nearest" }); }, 50);
}

function renderList(items, today) {
  const listView = document.getElementById("listView");
  if (items.length === 0) {
    listView.innerHTML = '<div class="status-box" style="border-radius:14px">この月の予定はありません</div>';
    return;
  }
  const sorted = items.slice().sort(function(a, b) {
    return (parseDate(a.date) || 0) - (parseDate(b.date) || 0);
  });
  listView.innerHTML = sorted.map(function(item) {
    const date  = parseDate(item.date);
    const day   = date ? date.getDate() : "?";
    const dow   = date ? DOW_JP[date.getDay()] : "?";
    const dcls  = date ? DOW_CLS[date.getDay()] : "dow-wk";
    const type  = detectType(item.type);
    const isT   = date && date.getTime() === today.getTime();
    const detail = item.detail
      ? '<div class="card-detail">' + esc(item.detail).replace(/\n/g, "<br>") + '</div>' : "";
    return '<div class="list-row' + (isT ? " list-today" : "") + '">'
      + '<div class="list-date-col ' + type + '">'
      + '<div class="list-day">' + day + '</div>'
      + '<div class="list-dow ' + dcls + '">' + dow + '</div>'
      + '</div>'
      + '<div class="list-content">'
      + '<div class="list-top">' + buildBadgesHtml(item) + '</div>'
      + buildMetaHtml(item).replace("card-meta", "list-meta")
      + detail
      + '</div></div>';
  }).join("");
}

/* ── 初期化 ── */
function init() {
  document.getElementById("clubNameHeader").textContent = CONFIG.clubName;
  document.getElementById("schoolNameSub").textContent  = CONFIG.schoolName;
  document.getElementById("coachName").textContent      = CONFIG.coachName;
  document.getElementById("lineInfo").textContent       = "LINE グループ「" + CONFIG.lineGroup + "」にてお知らせ";
  document.getElementById("emailInfo").textContent      = CONFIG.email;
  document.getElementById("footer").textContent         = "© " + CONFIG.schoolName + " " + CONFIG.clubName;
  CONFIG.notes.forEach(function(n) {
    const li = document.createElement("li");
    li.textContent = n;
    document.getElementById("notesList").appendChild(li);
  });
  if (CONFIG.absentFormUrl || CONFIG.carFormUrl) {
    document.getElementById("btnWrap").style.display = "flex";
    if (CONFIG.absentFormUrl) document.getElementById("btnAbsent").href = CONFIG.absentFormUrl;
    if (CONFIG.carFormUrl)    document.getElementById("btnCar").href    = CONFIG.carFormUrl;
  }
  fetchData();
}

async function fetchData() {
  try {
    const csv  = await getCSV();
    const rows = parseCSV(csv);
    if (rows.length < 2) throw new Error("シートにデータがありません");

    const allItems = rows.slice(1)
      .filter(function(r) { return r.length > COL.date && r[COL.date]; })
      .map(function(r) {
        return {
          target:    r[COL.target]    || "",
          date:      r[COL.date]      || "",
          startTime: r[COL.startTime] || "",
          endTime:   r[COL.endTime]   || "",
          type:      r[COL.type]      || "",
          location:  r[COL.location]  || "",
          detail:    r[COL.detail]    || "",
        };
      });

    if (allItems.length === 0) throw new Error("データが空です");

    // 月リストを生成
    const monthSet = {};
    allItems.forEach(function(i) {
      const d = parseDate(i.date);
      if (d) monthSet[d.getFullYear() + "-" + (d.getMonth()+1)] = true;
    });
    const months = Object.keys(monthSet).sort();

    const sel = document.getElementById("monthSelector");
    sel.innerHTML = months.map(function(m) {
      const p = m.split("-");
      return '<option value="' + m + '">' + p[0] + '年' + p[1] + '月</option>';
    }).join("");

    const today  = new Date(); today.setHours(0, 0, 0, 0);
    const todayM = today.getFullYear() + "-" + (today.getMonth() + 1);
    sel.value = months.indexOf(todayM) >= 0 ? todayM : months[0];

    window._allItems = allItems;
    renderMonth(sel.value);
    document.getElementById("updated").textContent = "最終取得：" + new Date().toLocaleString("ja-JP");

  } catch(e) {
    console.error(e);
    const errHtml = '<div class="status-box" style="border-radius:14px">'
      + '<div style="font-size:1.4rem;margin-bottom:8px">⚠️</div>'
      + '<div style="margin-bottom:4px">データの取得に失敗しました</div>'
      + '<div style="font-size:.75rem;margin-bottom:12px;color:#e05252">' + esc(e.message) + '</div>'
      + '<button onclick="fetchData()" style="padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:var(--navy);font-weight:700;cursor:pointer">再試行</button>'
      + '</div>';
    document.getElementById("calGrid").innerHTML = '<div style="grid-column:1/-1">' + errHtml + '</div>';
    document.getElementById("listView").innerHTML = errHtml;
  }
}

function onMonthChange() {
  const sel = document.getElementById("monthSelector");
  if (sel.value) renderMonth(sel.value);
}

window.addEventListener("DOMContentLoaded", init);
</script>
