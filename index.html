<style>
:root{--navy:#0a1628;--blue:#1a3a6b;--accent:#e8a020;--white:#fff;--light:#f4f6f9;--gray:#8a96a8;--border:#dde3ed;--text:#1e2a3a}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--light);color:var(--text);min-height:100vh}
header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4)}
.header-inner{max-width:960px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:14px}
.header-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-text{flex:1;min-width:0}
.header-title{font-family:'Oswald',sans-serif;font-size:1.1rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:.7rem;color:var(--gray);display:block;margin-top:1px}
#monthSelector{background:var(--accent);color:var(--navy);font-size:.75rem;font-weight:700;padding:5px 12px;border-radius:20px;border:none;cursor:pointer;outline:none;flex-shrink:0}
#monthSelector option{background:var(--navy);color:var(--white)}

.hero-title{font-family:'Oswald',sans-serif;font-size:clamp(1.8rem,7vw,3rem);font-weight:700;color:var(--white);line-height:1.1;position:relative}
.hero-title span{color:var(--accent)}
.hero-label{font-size:.75rem;color:rgba(255,255,255,.5);letter-spacing:.1em;margin-top:5px;position:relative}
.hero-stats{display:flex;justify-content:center;margin-top:22px;position:relative}
.stat{text-align:center;padding:0 14px;border-right:1px solid rgba(255,255,255,.15)}
.stat:last-child{border-right:none}
.stat-num{font-family:'Oswald',sans-serif;font-size:1.7rem;font-weight:600;color:var(--accent);line-height:1}

.notice-wrap{max-width:960px;margin:-16px auto 0;padding:0 20px;position:relative;z-index:10}

.updated{font-size:.7rem;color:var(--gray);text-align:right;margin-bottom:8px}
.btn-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}

@keyframes spin{to{transform:rotate(360deg)}}

.card-top{display:flex;gap:7px;align-items:flex-start;flex-wrap:wrap;margin-bottom:5px}
.list-view{display:none;flex-direction:column;background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(10,22,40,.07)}
.list-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border)}

.list-row:hover{background:#fafbff}

.list-day{font-family:'Oswald',sans-serif;font-size:1.55rem;font-weight:700;color:var(--navy);line-height:1}

.list-badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px}
.list-today .list-date-col{background:#fffbf0}.list-today .list-day{color:var(--accent)}
.notes-card{background:var(--white);border-radius:12px;padding:18px 20px;box-shadow:0 2px 10px rgba(10,22,40,.07);margin-bottom:28px}
.notes-list{list-style:none;display:flex;flex-direction:column;gap:9px;margin-top:4px}
.notes-list li{display:flex;gap:9px;font-size:.84rem;line-height:1.6;color:#3a4a5a}
.notes-list li::before{content:'●';color:var(--accent);font-size:.58rem;margin-top:6px;flex-shrink:0}
.contact-card{background:var(--navy);border-radius:12px;padding:18px 20px;color:var(--white)}
.contact-row{display:flex;align-items:flex-start;gap:10px;font-size:.82rem;color:rgba(255,255,255,.75);margin-top:9px}
footer{text-align:center;padding:20px;font-size:.7rem;color:var(--gray);border-top:1px solid var(--border)}
@media(min-width:769px){.cal-wrap{display:none}.cal-detail{display:none!important}.list-view{display:flex}}
@media(max-width:768px){.list-view{display:none!important}.hero{padding:24px 14px 32px}.stat{padding:0 10px}.stat-label{font-size:.58rem}}
</style>

<script>
var DOW_JP=["日","月","火","水","木","金","土"];
var DOW_CLS=["dow-sun","dow-wk","dow-wk","dow-wk","dow-wk","dow-wk","dow-sat"];
var TYPE_MAP={"部活動":"practice","大会":"match","練習試合":"scrimmage","保護者会練習":"event","部活動休養日":"rest"};
var TYPE_LABEL={practice:"部活動",match:"大会",scrimmage:"練習試合",event:"保護者会練習",rest:"休養",other:"その他"};
var TYPE_BADGE={practice:"badge-practice",match:"badge-match",scrimmage:"badge-scrimmage",event:"badge-event",rest:"badge-rest",other:"badge-other"};

function detectType(val){
  var t=(val||"").trim();
  if(TYPE_MAP[t])return TYPE_MAP[t];
  if(t.indexOf("大会")>=0||t.indexOf("選手権")>=0)return "match";
  if(t.indexOf("練習試合")>=0)return "scrimmage";
  if(t.indexOf("保護者")>=0)return "event";
  if(t.indexOf("休養")>=0||t.indexOf("休み")>=0)return "rest";
  if(t.indexOf("練習")>=0||t.indexOf("部活")>=0)return "practice";
  return "other";
}

function parseDate(str){
  if(!str)return null;
  var s=str.replace(/年/g,"/").replace(/月/g,"/").replace(/日/g,"");
  var p=s.split(/[\/\-]/);
  if(p.length<3)return null;
  var y=parseInt(p[0]),m=parseInt(p[1]),d=parseInt(p[2]);
  if(!y||!m||!d)return null;
  var dt=new Date(y,m-1,d);
  return isNaN(dt.getTime())?null:dt;
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function getTargetCls(t){
  var map={"全員":"target-all","女子のみ":"target-female","男子のみ":"target-male","限定対象":"target-limit"};
  return map[t]||"target-all";
}

function buildBadges(item){
  var type=detectType(item.type);
  var html='<span class="type-badge '+TYPE_BADGE[type]+'">'+TYPE_LABEL[type]+'</span>';
  if(item.target)html+=' <span class="target-badge '+getTargetCls(item.target)+'">'+esc(item.target)+'</span>';
  return html;
}

function buildMetas(item){
  var parts=[];
  if(item.startTime)parts.push('<span class="meta-pill"><span class="meta-label">【集合時間】</span>'+esc(item.startTime)+'</span>');
  if(item.endTime)  parts.push('<span class="meta-pill"><span class="meta-label">【解散時間】</span>'+esc(item.endTime)+'</span>');
  if(item.location) parts.push('<span class="meta-pill"><span class="meta-label">【場所】</span>'+esc(item.location)+'</span>');
  return parts.length?'<div class="card-meta">'+parts.join("")+'</div>':"";
}

function buildCard(item){
  var type=detectType(item.type);
  var detail=item.detail?'<div class="card-detail">'+esc(item.detail).replace(/\n/g,"<br>")+'</div>':"";
  return '<div class="card '+type+'"><div class="card-top">'+buildBadges(item)+'</div>'+buildMetas(item)+detail+'</div>';
}

function fetchWithTimeout(url,ms){
  return new Promise(function(resolve,reject){
    var tid=setTimeout(function(){reject(new Error("timeout"));},ms);
    fetch(url).then(function(r){clearTimeout(tid);resolve(r);}).catch(function(e){clearTimeout(tid);reject(e);});
  });
}

function getCSV(){
  return fetchWithTimeout(SHEET_CSV_URL,8000)
    .then(function(r){if(!r.ok)throw new Error("ng");return r.text();})
    .then(function(t){if(t&&t.indexOf(",")>=0)return t;throw new Error("invalid");})
    .catch(function(){
      return fetchWithTimeout("https://corsproxy.io/?"+encodeURIComponent(SHEET_CSV_URL),8000)
        .then(function(r){return r.text();})
        .catch(function(){
          return fetchWithTimeout("https://api.allorigins.win/get?url="+encodeURIComponent(SHEET_CSV_URL),8000)
            .then(function(r){return r.text();})
            .then(function(t){try{var j=JSON.parse(t);if(j.contents)return j.contents;}catch(e){}return t;});
        });
    });
}

function parseCSV(text){
  var rows=[];
  var lines=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(!line.trim())continue;
    var cols=[],cur="",inQ=false;
    for(var j=0;j<line.length;j++){
      var c=line[j];
      if(c==='"'&&!inQ)inQ=true;
      else if(c==='"'&&inQ){if(line[j+1]==='"'){cur+='"';j++;}else inQ=false;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=c;
    }
    cols.push(cur.trim());rows.push(cols);
  }
  return rows;
}

function renderMonth(monthKey){
  var p=monthKey.split("-"),y=parseInt(p[0]),mo=parseInt(p[1]);
  var today=new Date();today.setHours(0,0,0,0);
  var items=(window._allItems||[]).filter(function(item){
    var d=parseDate(item.date);
    return d&&d.getFullYear()===y&&(d.getMonth()+1)===mo;
  });
  document.getElementById("heroTitle").innerHTML="<span>"+mo+"</span>月予定";
  document.getElementById("statPractice").textContent =items.filter(function(i){return detectType(i.type)==="practice";}).length;
  document.getElementById("statMatch").textContent    =items.filter(function(i){return detectType(i.type)==="match";}).length;
  document.getElementById("statScrimmage").textContent=items.filter(function(i){return detectType(i.type)==="scrimmage";}).length;
  document.getElementById("statParents").textContent  =items.filter(function(i){return detectType(i.type)==="event";}).length;
  var mi=items.filter(function(i){var t=detectType(i.type);return t==="match"||t==="scrimmage";});
  mi.sort(function(a,b){return(parseDate(a.date)||0)-(parseDate(b.date)||0);});
  if(mi.length>0){
    var ne=mi[0],d=parseDate(ne.date);
    var ds=d?(d.getMonth()+1)+"月"+d.getDate()+"日（"+DOW_JP[d.getDay()]+"）":ne.date;
    document.getElementById("noticeText").textContent="📅 "+TYPE_LABEL[detectType(ne.type)]+"："+ds+(ne.startTime?" 集合 "+ne.startTime:"");
    document.getElementById("noticeWrap").style.display="block";
  }else{document.getElementById("noticeWrap").style.display="none";}
  renderCalendar(y,mo,items,today);
  renderList(items,today);
  document.getElementById("calDetail").classList.remove("show");
}

function renderCalendar(y,mo,items,today){
  var dayMap={};
  items.forEach(function(item){
    var d=parseDate(item.date);if(!d)return;
    var k=d.getDate();if(!dayMap[k])dayMap[k]=[];dayMap[k].push(item);
  });
  var firstDow=new Date(y,mo-1,1).getDay(),lastDate=new Date(y,mo,0).getDate(),html="";
  for(var i=0;i<firstDow;i++)html+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=lastDate;d++){
    var date=new Date(y,mo-1,d),dow=date.getDay(),isT=date.getTime()===today.getTime();
    var evs=dayMap[d]||[],dcls=dow===0?"sun":dow===6?"sat":"";
    var badges=evs.map(function(ev){return'<div class="cal-badge '+detectType(ev.type)+'"></div>';}).join("");
    html+='<div class="cal-cell '+dcls+(isT?" today":"")+'" onclick="selectDay('+y+','+mo+','+d+',this)">'
      +'<div class="cal-date-num">'+d+'</div><div class="cal-badges">'+badges+'</div></div>';
  }
  var rem=(firstDow+lastDate)%7;
  if(rem>0)for(var i=0;i<7-rem;i++)html+='<div class="cal-cell empty"></div>';
  document.getElementById("calGrid").innerHTML=html;
}

function selectDay(y,mo,d,el){
  document.querySelectorAll(".cal-cell.selected").forEach(function(c){c.classList.remove("selected");});
  el.classList.add("selected");
  var evs=(window._allItems||[]).filter(function(item){
    var dd=parseDate(item.date);
    return dd&&dd.getFullYear()===y&&(dd.getMonth()+1)===mo&&dd.getDate()===d;
  });
  document.getElementById("calDetailDate").textContent=mo+"月"+d+"日（"+DOW_JP[new Date(y,mo-1,d).getDay()]+"）の予定";
  document.getElementById("detailCards").innerHTML=evs.length?evs.map(buildCard).join(""):'<div style="font-size:.84rem;color:var(--gray);padding:4px 0">この日の予定はありません</div>';
  var det=document.getElementById("calDetail");
  det.classList.add("show");
  setTimeout(function(){det.scrollIntoView({behavior:"smooth",block:"nearest"});},50);
}

function renderList(items,today){
  var lv=document.getElementById("listView");
  if(items.length===0){lv.innerHTML='<div class="status-box" style="border-radius:14px">この月の予定はありません</div>';return;}
  var sorted=items.slice().sort(function(a,b){return(parseDate(a.date)||0)-(parseDate(b.date)||0);});
  lv.innerHTML=sorted.map(function(item){
    var date=parseDate(item.date),day=date?date.getDate():"?";
    var dow=date?DOW_JP[date.getDay()]:"?",dcls=date?DOW_CLS[date.getDay()]:"dow-wk";
    var type=detectType(item.type),isT=date&&date.getTime()===today.getTime();
    return '<div class="list-row'+(isT?" list-today":"")+'">'
      +'<div class="list-date-col '+type+'"><div class="list-day">'+day+'</div><div class="list-dow '+dcls+'">'+dow+'</div></div>'
      +'<div class="list-content"><div class="list-badges">'+buildBadges(item)+'</div>'+buildMetas(item)
      +(item.detail?'<div class="card-detail">'+esc(item.detail).replace(/\n/g,"<br>")+'</div>':"")
      +'</div></div>';
  }).join("");
}

function onMonthChange(){var sel=document.getElementById("monthSelector");if(sel.value)renderMonth(sel.value);}

function init(){
  document.getElementById("clubNameHeader").textContent=CONFIG.clubName;
  document.getElementById("schoolNameSub").textContent=CONFIG.schoolName;
  document.getElementById("coachName").textContent=CONFIG.coachName;
  document.getElementById("lineInfo").textContent="LINE グループ「"+CONFIG.lineGroup+"」にてお知らせ";
  document.getElementById("emailInfo").textContent=CONFIG.email;
  document.getElementById("footer").textContent="© "+CONFIG.schoolName+" "+CONFIG.clubName;
  CONFIG.notes.forEach(function(n){var li=document.createElement("li");li.textContent=n;document.getElementById("notesList").appendChild(li);});
  if(CONFIG.absentFormUrl||CONFIG.carFormUrl){
    document.getElementById("btnWrap").style.display="flex";
    if(CONFIG.absentFormUrl)document.getElementById("btnAbsent").href=CONFIG.absentFormUrl;
    if(CONFIG.carFormUrl)document.getElementById("btnCar").href=CONFIG.carFormUrl;
  }
  getCSV().then(function(csv){
    var rows=parseCSV(csv);
    if(rows.length<2)throw new Error("データがありません");
    var allItems=rows.slice(1).filter(function(r){return r.length>COL.date&&r[COL.date];}).map(function(r){
      return{target:r[COL.target]||"",date:r[COL.date]||"",startTime:r[COL.startTime]||"",endTime:r[COL.endTime]||"",type:r[COL.type]||"",location:r[COL.location]||"",detail:r[COL.detail]||""};
    });
    var monthSet={};
    allItems.forEach(function(i){var d=parseDate(i.date);if(d)monthSet[d.getFullYear()+"-"+(d.getMonth()+1)]=true;});
    var months=Object.keys(monthSet).sort();
    var sel=document.getElementById("monthSelector");
    sel.innerHTML=months.map(function(m){var p=m.split("-");return'<option value="'+m+'">'+p[0]+'年'+p[1]+'月</option>';}).join("");
    var today=new Date();today.setHours(0,0,0,0);
    var todayM=today.getFullYear()+"-"+(today.getMonth()+1);
    sel.value=monthSet[todayM]?todayM:months[0];
    window._allItems=allItems;
    renderMonth(sel.value);
    document.getElementById("updated").textContent="最終取得："+new Date().toLocaleString("ja-JP");
  }).catch(function(e){
    console.error(e);
    var errHtml='<div class="status-box"><div style="font-size:1.4rem;margin-bottom:8px">⚠️</div><div style="margin-bottom:4px">データの取得に失敗しました</div><div style="font-size:.75rem;margin-bottom:12px;color:#e05252">'+esc(e.message)+'</div><button onclick="location.reload()" style="padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:var(--navy);font-weight:700;cursor:pointer">再読み込み</button></div>';
    document.getElementById("calGrid").innerHTML='<div style="grid-column:1/-1">'+errHtml+'</div>';
    document.getElementById("listView").innerHTML=errHtml;
  });
}
window.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
